<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#f8c8dc;
font-family:Arial;
overflow:hidden;
}

/* Animated Card */
.card{
position:relative;
width:320px;
height:200px;
background:#fff;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
overflow:hidden;
}

/* Lines */
.line{
position:absolute;
width:3px;
height:0;
background:#ff4081;
top:20px;
animation:grow 1s forwards;
}

.line.left{left:30px;}
.line.right{right:30px;}

@keyframes grow{
to{height:160px;}
}

/* Heart */
.heart{
font-size:40px;
opacity:0;
transform:scale(0);
animation:pop 1s 1s forwards;
}

@keyframes pop{
50%{transform:scale(1.3);}
100%{transform:scale(1);opacity:1;}
}

/* Text */
.text{
margin-top:15px;
font-size:22px;
color:#c2185b;
opacity:0;
animation:slideIn 1s 2s forwards;
}

@keyframes slideIn{
from{transform:translateY(20px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

/* Buttons */
button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:14px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<div class="line left"></div>
<div class="line right"></div>

<div class="heart">❤️</div>
<div class="text">Happy Birthday Chirag</div>
</div>

<button onclick="toggleMusic()">🎵 Play Music</button>
<button onclick="window.location.href='gallery.html'">
See Pictures 📸
</button>

<audio id="bgMusic" src="loveyou.mp3"></audio>

<script>
const music=document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
if(!playing){
music.play();
playing=true;
}else{
music.pause();
playing=false;
}
}
</script>

</body>
</html>
