<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0);
font-family:Arial;
overflow:hidden;
}

/* Card */
.card{
position:relative;
width:340px;
height:200px;
background:white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
overflow:hidden;
}

/* Animated Lines */
.line{
position:absolute;
width:3px;
height:0;
background:#ff4081;
top:20px;
animation:grow 3s infinite;
}

.line.left{left:30px;}
.line.right{right:30px;}

@keyframes grow{
0%{height:0;}
30%{height:160px;}
70%{height:160px;}
100%{height:0;}
}

/* Glowing Heart */
.heart{
width:50px;
height:50px;
background:#ff4d6d;
position:relative;
transform:rotate(-45deg);
animation:beat 1.2s infinite;
box-shadow:0 0 20px #ff4d6d;
margin-bottom:15px;
}

.heart:before,
.heart:after{
content:"";
width:50px;
height:50px;
background:#ff4d6d;
border-radius:50%;
position:absolute;
}

.heart:before{
top:-25px;
left:0;
}

.heart:after{
left:25px;
top:0;
}

@keyframes beat{
0%{transform:scale(1) rotate(-45deg);}
50%{transform:scale(1.15) rotate(-45deg);}
100%{transform:scale(1) rotate(-45deg);}
}

/* Text Animation */
.text{
font-size:22px;
color:#c2185b;
opacity:0;
animation:textLoop 3s infinite;
}

@keyframes textLoop{
0%{opacity:0;transform:translateY(20px);}
30%{opacity:1;transform:translateY(0);}
70%{opacity:1;}
100%{opacity:0;transform:translateY(-20px);}
}

/* Buttons */
button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="card">
<div class="line left"></div>
<div class="line right"></div>

<div class="heart"></div>

<div class="text">Happy Birthday Chirag</div>
</div>

<button onclick="toggleMusic()">🎵 Play / Pause Music</button>
<button onclick="window.location.href='gallery.html'">
See Pictures 📸
</button>

<audio id="bgMusic" src="loveyou.mp3"></audio>

<script>
const music=document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
if(!playing){
music.play();
playing=true;
}else{
music.pause();
playing=false;
}
}
</script>

</body>
</html>
