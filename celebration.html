<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0);
font-family:Arial;
overflow:hidden;
}

/* Sparkles */
.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.6;
animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* Balloons */
.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:50px;
background:#ff8fab;
border-radius:50%;
animation:float 8s linear infinite;
cursor:pointer;
}
@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* Card */
.card{
position:relative;
width:360px;
height:320px;
background:white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
overflow:hidden;
}

/* Cake */
.cake{
position:relative;
width:140px;
height:120px;
margin-bottom:20px;
animation:drop 6s infinite;
filter:drop-shadow(0 10px 15px rgba(0,0,0,0.2));
}

@keyframes drop{
0%{transform:translateY(-350px);}
40%{transform:translateY(0);}
55%{transform:translateY(-20px);}
70%{transform:translateY(0);}
100%{transform:translateY(-350px);}
}

/* Cake layers */
.layer{
width:140px;
height:30px;
background:#ff8fab;
border-radius:10px;
position:absolute;
bottom:0;
opacity:0;
animation:layerAppear 6s infinite;
}

.layer.middle{
bottom:30px;
background:#ffb3c6;
animation-delay:0.2s;
}

.layer.top{
bottom:60px;
background:#ffc2d1;
animation-delay:0.4s;
}

@keyframes layerAppear{
0%,35%{opacity:0;}
40%,90%{opacity:1;}
100%{opacity:0;}
}

/* Candle 27 */
.candle{
position:absolute;
top:-50px;
left:50%;
transform:translateX(-50%);
font-size:26px;
font-weight:bold;
color:#ff4081;
text-shadow:0 0 15px #ff4081;
opacity:0;
animation:candleAppear 6s infinite;
}

@keyframes candleAppear{
0%,45%{opacity:0;}
55%,90%{opacity:1;}
100%{opacity:0;}
}

/* Confetti */
.confetti{
position:absolute;
width:6px;
height:6px;
background:gold;
animation:confettiFall 2s linear forwards;
}
@keyframes confettiFall{
from{transform:translateY(0);}
to{transform:translateY(100vh);}
}

/* Fireworks */
.firework{
position:absolute;
width:5px;
height:5px;
background:orange;
border-radius:50%;
animation:explode 2s linear forwards;
}
@keyframes explode{
0%{opacity:1; transform:scale(1);}
100%{opacity:0; transform:scale(6);}
}

/* Split Text */
.text-wrapper{
overflow:hidden;
height:40px;
}

.text{
font-size:24px;
font-weight:bold;
color:#c2185b;
white-space:nowrap;
}

.left-part{
display:inline-block;
transform:translateX(-150%);
animation:slideLeft 6s infinite;
}

.right-part{
display:inline-block;
transform:translateX(150%);
animation:slideRight 6s infinite;
}

@keyframes slideLeft{
0%{transform:translateX(-150%);}
55%{transform:translateX(0);}
85%{transform:translateX(0);}
100%{transform:translateX(-150%);}
}

@keyframes slideRight{
0%{transform:translateX(150%);}
55%{transform:translateX(0);}
85%{transform:translateX(0);}
100%{transform:translateX(150%);}
}

/* Buttons */
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="card">

<div class="cake">
<div class="layer"></div>
<div class="layer middle"></div>
<div class="layer top"></div>
<div class="candle">27</div>
</div>

<div class="text-wrapper">
<div class="text">
<span class="left-part">Happy Birthday</span>
<span class="right-part"> Chirag 🎂</span>
</div>
</div>

</div>

<button onclick="toggleMusic()">🎵 Play / Pause Music</button>
<button onclick="window.location.href='gallery.html'">
See Pictures 📸
</button>

<audio id="bgMusic" src="loveyou.mp3"></audio>

<script>
const music=document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
if(!playing){
music.volume=0;
music.play();
let fade=setInterval(()=>{
if(music.volume<1){
music.volume+=0.05;
}else{clearInterval(fade);}
},200);
playing=true;
}else{
music.pause();
playing=false;
}
}

/* Sparkles */
for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

/* Balloons */
for(let i=0;i<10;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(6+Math.random()*4)+"s";
b.onclick=function(){
b.remove();
burstConfetti(b.style.left);
};
document.body.appendChild(b);
}

/* Confetti Burst */
function burstConfetti(x){
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=x;
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}

/* Fireworks */
setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*50+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),2000);
},3000);
</script>

</body>
</html>
