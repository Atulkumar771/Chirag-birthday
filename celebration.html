<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffc1cc,#ffe4ec);
overflow:hidden;
}

h1{
margin-top:100px;
color:#c2185b;
font-size:36px;
}

.level{
color:#ff4081;
font-size:22px;
margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:16px;
}

.confetti{
position:absolute;
width:8px;
height:8px;
background:white;
animation:fall 5s linear infinite;
}

@keyframes fall{
from{transform:translateY(-100vh);}
to{transform:translateY(100vh);}
}
</style>
</head>
<body>

<h1>🎉 Happy 27th Birthday Chirag 🎂</h1>
<div class="level">More Than A Best Friend. A Brother. 👑</div>

<button onclick="window.location.href='gallery.html'">
See The Star 🌟
</button>

<audio src="loveyou.mp3" autoplay loop></audio>

<script>
for(let i=0;i<60;i++){
const conf=document.createElement("div");
conf.className="confetti";
conf.style.left=Math.random()*100+"vw";
conf.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(conf);
}
</script>

</body>
</html>
