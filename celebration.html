<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0);
font-family:Arial;
overflow:hidden;
}

/* Floating Balloons */
.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:50px;
background:#ff8fab;
border-radius:50%;
animation:float 8s linear infinite;
opacity:0.6;
}
@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* Card */
.card{
position:relative;
width:360px;
height:300px;
background:white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
overflow:hidden;
}

/* Cake Drop */
.cake{
position:relative;
width:120px;
height:100px;
margin-bottom:20px;
animation:drop 6s infinite;
}

@keyframes drop{
0%{transform:translateY(-300px);}
40%{transform:translateY(0);}
55%{transform:translateY(-20px);}
70%{transform:translateY(0);}
100%{transform:translateY(-300px);}
}

/* Cake Layers slice-by-slice */
.layer{
width:120px;
height:30px;
background:#ff8fab;
border-radius:10px;
position:absolute;
bottom:0;
opacity:0;
animation:layerAppear 6s infinite;
}

.layer.middle{
bottom:30px;
background:#ffb3c6;
animation-delay:0.2s;
}

.layer.top{
bottom:60px;
background:#ffc2d1;
animation-delay:0.4s;
}

@keyframes layerAppear{
0%,35%{opacity:0;}
40%,90%{opacity:1;}
100%{opacity:0;}
}

/* Candle 27 */
.candle{
position:absolute;
top:-45px;
left:45px;
font-size:22px;
font-weight:bold;
color:#ff4081;
opacity:0;
animation:candleAppear 6s infinite;
}

@keyframes candleAppear{
0%,45%{opacity:0;}
55%,90%{opacity:1;}
100%{opacity:0;}
}

/* Fireworks */
.firework{
position:absolute;
width:5px;
height:5px;
background:gold;
border-radius:50%;
animation:explode 6s infinite;
}

@keyframes explode{
0%,50%{opacity:0;}
60%{opacity:1; transform:scale(1);}
70%{transform:scale(5); opacity:0;}
100%{opacity:0;}
}

/* Split Text */
.text-wrapper{
position:relative;
overflow:hidden;
height:40px;
}

.text{
font-size:24px;
font-weight:bold;
color:#c2185b;
white-space:nowrap;
}

.left-part{
display:inline-block;
transform:translateX(-150%);
animation:slideLeft 6s infinite;
}

.right-part{
display:inline-block;
transform:translateX(150%);
animation:slideRight 6s infinite;
}

@keyframes slideLeft{
0%{transform:translateX(-150%);}
55%{transform:translateX(0);}
85%{transform:translateX(0);}
100%{transform:translateX(-150%);}
}

@keyframes slideRight{
0%{transform:translateX(150%);}
55%{transform:translateX(0);}
85%{transform:translateX(0);}
100%{transform:translateX(150%);}
}

/* Buttons */
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<!-- Balloons -->
<script>
for(let i=0;i<8;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(b);
}
</script>

<div class="card">

<div class="cake">
<div class="layer"></div>
<div class="layer middle"></div>
<div class="layer top"></div>
<div class="candle">27</div>
</div>

<div class="text-wrapper">
<div class="text">
<span class="left-part">Happy Birthday</span>
<span class="right-part"> Chirag 🎂</span>
</div>
</div>

</div>

<button onclick="toggleMusic()">🎵 Play / Pause Music</button>
<button onclick="window.location.href='gallery.html'">
See Pictures 📸
</button>

<audio id="bgMusic" src="loveyou.mp3"></audio>

<script>
const music=document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
if(!playing){
music.play();
playing=true;
}else{
music.pause();
playing=false;
}
}

/* Fireworks spawn */
setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*50+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),2000);
},2000);
</script>

</body>
</html>
