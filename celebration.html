<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0);
font-family:Arial;
overflow:hidden;
}

/* Card */
.card{
position:relative;
width:360px;
height:260px;
background:white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
overflow:hidden;
}

/* Cake Drop */
.cake{
position:relative;
width:100px;
height:80px;
margin-bottom:20px;
animation:drop 5s infinite;
}

@keyframes drop{
0%{transform:translateY(-250px);}
40%{transform:translateY(0);}
55%{transform:translateY(-15px);}
70%{transform:translateY(0);}
100%{transform:translateY(-250px);}
}

.layer{
width:100px;
height:40px;
background:#ff8fab;
border-radius:10px;
position:absolute;
bottom:0;
}

.layer.top{
width:80px;
height:30px;
background:#ffb3c6;
bottom:40px;
left:10px;
border-radius:10px;
}

.candle{
width:10px;
height:25px;
background:#fff;
position:absolute;
top:-35px;
left:45px;
border-radius:3px;
}

.flame{
width:10px;
height:10px;
background:orange;
border-radius:50%;
position:absolute;
top:-45px;
left:45px;
animation:flicker 1s infinite alternate;
box-shadow:0 0 10px orange;
}

@keyframes flicker{
0%{transform:scale(1);}
100%{transform:scale(1.3);}
}

/* Split Text */
.text-wrapper{
position:relative;
overflow:hidden;
height:40px;
margin-top:10px;
}

.text{
font-size:24px;
font-weight:bold;
color:#c2185b;
white-space:nowrap;
}

/* Split halves */
.left-part{
display:inline-block;
transform:translateX(-150%);
animation:slideLeft 5s infinite;
}

.right-part{
display:inline-block;
transform:translateX(150%);
animation:slideRight 5s infinite;
}

@keyframes slideLeft{
0%{transform:translateX(-150%);}
40%{transform:translateX(0);}
70%{transform:translateX(0);}
100%{transform:translateX(-150%);}
}

@keyframes slideRight{
0%{transform:translateX(150%);}
40%{transform:translateX(0);}
70%{transform:translateX(0);}
100%{transform:translateX(150%);}
}

/* Buttons */
button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="card">

<div class="cake">
<div class="layer top"></div>
<div class="layer"></div>
<div class="candle"></div>
<div class="flame"></div>
</div>

<div class="text-wrapper">
<div class="text">
<span class="left-part">Happy Birthday</span>
<span class="right-part"> Chirag 🎂</span>
</div>
</div>

</div>

<button onclick="toggleMusic()">🎵 Play / Pause Music</button>
<button onclick="window.location.href='gallery.html'">
See Pictures 📸
</button>

<audio id="bgMusic" src="loveyou.mp3"></audio>

<script>
const music=document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
if(!playing){
music.play();
playing=true;
}else{
music.pause();
playing=false;
}
}
</script>

</body>
</html>
