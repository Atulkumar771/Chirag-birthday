<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0);
font-family:Arial;
overflow:hidden;
}

/* ===== IMPROVED BALLOONS ===== */
.balloon{
position:absolute;
bottom:-120px;
width:50px;
height:65px;
border-radius:50% 50% 45% 45%;
animation:float 10s linear infinite;
cursor:pointer;
}

.balloon::after{ /* string */
content:"";
position:absolute;
width:2px;
height:60px;
background:#999;
top:65px;
left:50%;
transform:translateX(-50%);
}

.balloon::before{ /* shine */
content:"";
position:absolute;
width:15px;
height:25px;
background:rgba(255,255,255,0.4);
border-radius:50%;
top:10px;
left:12px;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-130vh);}
}

/* ===== CARD ===== */
.card{
position:relative;
width:380px;
height:340px;
background:white;
border-radius:25px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
overflow:hidden;
}

/* ===== IMPROVED CAKE ===== */
.cake{
position:relative;
width:160px;
height:140px;
margin-bottom:20px;
animation:drop 6s infinite;
}

@keyframes drop{
0%{transform:translateY(-400px);}
40%{transform:translateY(0);}
55%{transform:translateY(-25px);}
70%{transform:translateY(0);}
100%{transform:translateY(-400px);}
}

/* Plate */
.plate{
position:absolute;
bottom:-10px;
width:180px;
height:20px;
background:#eee;
border-radius:50%;
left:50%;
transform:translateX(-50%);
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* Layers */
.layer{
width:160px;
height:35px;
background:#ff8fab;
border-radius:10px;
position:absolute;
bottom:0;
}

.layer.middle{
bottom:35px;
background:#ffb3c6;
}

.layer.top{
bottom:70px;
background:#ffc2d1;
}

/* Icing drip */
.icing{
position:absolute;
bottom:100px;
width:160px;
height:20px;
background:#fff;
border-radius:10px;
}

/* Candle 27 */
.candle{
position:absolute;
top:-50px;
left:50%;
transform:translateX(-50%);
font-size:28px;
font-weight:bold;
color:#ff4081;
text-shadow:0 0 15px #ff4081;
}

/* ===== SPLIT TEXT ===== */
.text-wrapper{
overflow:hidden;
height:45px;
}

.text{
font-size:26px;
font-weight:bold;
color:#c2185b;
white-space:nowrap;
}

.left-part{
display:inline-block;
transform:translateX(-150%);
animation:slideLeft 6s infinite;
}

.right-part{
display:inline-block;
transform:translateX(150%);
animation:slideRight 6s infinite;
}

@keyframes slideLeft{
0%{transform:translateX(-150%);}
55%{transform:translateX(0);}
85%{transform:translateX(0);}
100%{transform:translateX(-150%);}
}

@keyframes slideRight{
0%{transform:translateX(150%);}
55%{transform:translateX(0);}
85%{transform:translateX(0);}
100%{transform:translateX(150%);}
}

/* ===== FIREWORKS ===== */
.firework{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
animation:explode 2s linear forwards;
}
@keyframes explode{
0%{opacity:1; transform:scale(1);}
100%{opacity:0; transform:scale(8);}
}

/* ===== BUTTONS ===== */
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="card">

<div class="cake">
<div class="plate"></div>
<div class="layer"></div>
<div class="layer middle"></div>
<div class="layer top"></div>
<div class="icing"></div>
<div class="candle">27</div>
</div>

<div class="text-wrapper">
<div class="text">
<span class="left-part">Happy Birthday</span>
<span class="right-part"> Chirag 🎂</span>
</div>
</div>

</div>

<button onclick="toggleMusic()">🎵 Play / Pause Music</button>
<button onclick="window.location.href='gallery.html'">
See Pictures 📸
</button>

<audio id="bgMusic" src="loveyou.mp3"></audio>

<script>
const music=document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
if(!playing){
music.volume=0;
music.play();
let fade=setInterval(()=>{
if(music.volume<1){music.volume+=0.05;}
else{clearInterval(fade);}
},200);
playing=true;
}else{
music.pause();
playing=false;
}
}

/* Better Balloons */
const colors=["#ff8fab","#ffb3c6","#ffc2d1","#ff6b6b","#ffa94d"];
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=colors[Math.floor(Math.random()*colors.length)];
b.style.animationDuration=(8+Math.random()*5)+"s";
document.body.appendChild(b);
}

/* Fireworks */
setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*50+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),2000);
},3000);
</script>

</body>
</html>
