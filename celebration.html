<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
overflow:hidden;
text-align:center;
}

/* Text Animation */
.text{
font-size:36px;
color:#c2185b;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* Heart */
.heart{
font-size:60px;
margin:20px 0;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

/* Music Button */
.music-btn{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:16px;
margin-top:20px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.next-btn{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#c2185b;
color:white;
font-size:14px;
}
</style>
</head>
<body>

<div class="text" id="mainText">
Happy Birthday Chirag
</div>

<div class="heart">❤️</div>

<button class="music-btn" onclick="toggleMusic()">
🎵 Play Music
</button>

<button class="next-btn" onclick="window.location.href='gallery.html'">
See Pictures 📸
</button>

<audio id="bgMusic" src="loveyou.mp3"></audio>

<script>
const music = document.getElementById("bgMusic");
let playing = false;

function toggleMusic(){
if(!playing){
music.play();
playing = true;
document.querySelector(".music-btn").innerText="⏸ Pause Music";
}else{
music.pause();
playing = false;
document.querySelector(".music-btn").innerText="🎵 Play Music";
}
}
</script>

</body>
</html>
