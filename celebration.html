<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chirag 🎉</title>

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0);
font-family:Arial;
overflow-x:hidden;
position:relative;
}

/* ===== BACKGROUND BALLOONS ===== */
.bg-balloon{
position:absolute;
width:60px;
height:80px;
border-radius:50% 50% 45% 45%;
opacity:0.25;
filter:blur(1px);
animation:float 18s linear infinite;
z-index:0;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* ===== CARD ===== */
.card{
position:relative;
z-index:2;
width:380px;
background:white;
border-radius:25px;
padding:30px 20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
align-items:center;
}

/* ===== CAKE ===== */
.cake{
position:relative;
width:160px;
height:140px;
margin-bottom:20px;
animation:drop 6s infinite;
}

@keyframes drop{
0%{transform:translateY(-300px);}
40%{transform:translateY(0);}
55%{transform:translateY(-20px);}
70%{transform:translateY(0);}
100%{transform:translateY(-300px);}
}

.layer{
width:160px;
height:35px;
background:#ff8fab;
border-radius:10px;
position:absolute;
bottom:0;
}

.layer.middle{
bottom:35px;
background:#ffb3c6;
}

.layer.top{
bottom:70px;
background:#ffc2d1;
}

.icing{
position:absolute;
bottom:105px;
width:160px;
height:20px;
background:white;
border-radius:10px;
}

.plate{
position:absolute;
bottom:-10px;
width:180px;
height:20px;
background:#eee;
border-radius:50%;
left:50%;
transform:translateX(-50%);
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.candle{
position:absolute;
top:-50px;
left:50%;
transform:translateX(-50%);
font-size:28px;
font-weight:bold;
color:#ff4081;
text-shadow:0 0 15px #ff4081;
}

/* ===== SPLIT TEXT ===== */
.text-wrapper{
overflow:hidden;
height:45px;
margin-bottom:20px;
}

.text{
font-size:26px;
font-weight:bold;
color:#c2185b;
white-space:nowrap;
}

.left-part{
display:inline-block;
transform:translateX(-150%);
animation:slideLeft 6s infinite;
}

.right-part{
display:inline-block;
transform:translateX(150%);
animation:slideRight 6s infinite;
}

@keyframes slideLeft{
0%{transform:translateX(-150%);}
55%{transform:translateX(0);}
85%{transform:translateX(0);}
100%{transform:translateX(-150%);}
}

@keyframes slideRight{
0%{transform:translateX(150%);}
55%{transform:translateX(0);}
85%{transform:translateX(0);}
100%{transform:translateX(150%);}
}

/* ===== PHOTO GRID ===== */
.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
width:100%;
margin-top:10px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:transform 0.3s ease;
}

.gallery img:hover{
transform:scale(1.05);
}

/* ===== BUTTON ===== */
button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
z-index:2;
}
</style>
</head>
<body>

<!-- BACKGROUND BALLOONS -->
<script>
const colors=["#ff8fab","#ffb3c6","#ffc2d1","#ffa6c1"];
for(let i=0;i<6;i++){
let b=document.createElement("div");
b.className="bg-balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=colors[Math.floor(Math.random()*colors.length)];
b.style.animationDuration=(15+Math.random()*10)+"s";
document.body.appendChild(b);
}
</script>

<div class="card">

<div class="cake">
<div class="plate"></div>
<div class="layer"></div>
<div class="layer middle"></div>
<div class="layer top"></div>
<div class="icing"></div>
<div class="candle">27</div>
</div>

<div class="text-wrapper">
<div class="text">
<span class="left-part">Happy Birthday</span>
<span class="right-part"> Chirag 🎂</span>
</div>
</div>

<div class="gallery">
<img src="chirag1.jpg">
<img src="chirag2.jpg">
<img src="chirag3.jpg">
<img src="chirag4.jpg">
<img src="chirag5.jpg">
<img src="chirag6.jpg">
</div>

</div>

<button onclick="toggleMusic()">🎵 Play / Pause Music</button>

<audio id="bgMusic" src="loveyou.mp3"></audio>

<script>
const music=document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
if(!playing){
music.volume=0;
music.play();
let fade=setInterval(()=>{
if(music.volume<1){music.volume+=0.05;}
else{clearInterval(fade);}
},200);
playing=true;
}else{
music.pause();
playing=false;
}
}
</script>

</body>
</html>
