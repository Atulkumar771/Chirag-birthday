<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chirag Turns 27 🎂</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
color:#c2185b;
}

#timer{
font-size:40px;
color:#ff4081;
margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
<h1>🎂 Chirag Turns 27 🎂</h1>
<div id="timer"></div>
<p>Unlocking at Midnight</p>
</div>

<script>
const TEST_MODE = false; // change to false on birthday night

const targetDate = new Date("February 18, 2026 00:00:00").getTime();
const timerEl = document.getElementById("timer");

const interval = setInterval(() => {

const now = new Date().getTime();
const distance = targetDate - now;

if(distance <= 0 || TEST_MODE){
clearInterval(interval);
window.location.href="celebration.html";
}

const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
const seconds = Math.floor((distance % (1000*60))/1000);

timerEl.innerHTML = hours+"h : "+minutes+"m : "+seconds+"s";

},1000);
</script>

</body>
</html>
