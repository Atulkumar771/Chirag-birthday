<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chirag Birthday Portal 🎂</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffe6f0,#ffd1dc);
font-family:Arial;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
max-width:350px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

h1{
color:#c2185b;
margin-bottom:20px;
}

#content{
font-size:20px;
font-weight:bold;
color:#444;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff1493;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>
<body>

<div class="card">
<h1>🎂 Birthday Portal 🎂</h1>
<div id="content"></div>
</div>

<script>

const targetDate = new Date("February 18, 2026 00:00:00");
const now = new Date();
const content = document.getElementById("content");

if(now < targetDate){

    function updateCountdown(){
        const now = new Date();
        const distance = targetDate - now;

        if(distance <= 0){
            content.innerHTML =
            "🎉 It's Time! 🎉<br><button onclick='enter()'>Enter Celebration</button>";
            return;
        }

        const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
        const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
        const seconds = Math.floor((distance % (1000*60))/(1000));

        content.innerHTML =
        hours + "h " + minutes + "m " + seconds + "s";
    }

    setInterval(updateCountdown,1000);
    updateCountdown();

}else{
    // After birthday passed
    content.innerHTML =
    "🎉 27 Years Completed 🎉<br><button onclick='enter()'>Enter Celebration</button>";
}

function enter(){
    window.location.href="celebration.html";
}

</script>

</body>
</html>
