<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chirag Birthday Live Age 🎂</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffe6f0,#ffd1dc);
font-family:Arial;
text-align:center;
color:#c2185b;
overflow:hidden;
}

.container{
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
max-width:400px;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

h1{
margin-bottom:20px;
}

.age-box{
margin-top:20px;
font-size:18px;
line-height:1.8;
color:#444;
}

.big-age{
font-size:22px;
font-weight:bold;
color:#ff1493;
margin-top:10px;
}

.unlock{
margin-top:25px;
font-weight:bold;
font-size:24px;
color:#ff1493;
opacity:0;
transition:1.5s ease;
}
</style>
</head>
<body>

<div class="container">
<h1>🎂 Live Age Counter 🎂</h1>

<div class="big-age" id="mainAge"></div>

<div class="age-box" id="ageDetails"></div>

<div class="unlock" id="unlockText">
🎉 He is 27 Now! 🎉
</div>
</div>

<script>

const birthDate = new Date("February 18, 1999 00:00:00");
const targetDate = new Date("February 18, 2026 00:00:00");

const mainAge = document.getElementById("mainAge");
const ageDetails = document.getElementById("ageDetails");
const unlockText = document.getElementById("unlockText");

function updateAge(){

const now = new Date();

// Calculate full years
let years = now.getFullYear() - birthDate.getFullYear();

// Create last birthday date
let lastBirthday = new Date(
    birthDate.getFullYear() + years,
    birthDate.getMonth(),
    birthDate.getDate()
);

// If birthday hasn’t occurred yet this year
if(now < lastBirthday){
    years--;
    lastBirthday = new Date(
        birthDate.getFullYear() + years,
        birthDate.getMonth(),
        birthDate.getDate()
    );
}

// Time since last birthday
let diff = now - lastBirthday;

let days = Math.floor(diff / (1000*60*60*24));
diff %= (1000*60*60*24);

let hours = Math.floor(diff / (1000*60*60));
diff %= (1000*60*60);

let minutes = Math.floor(diff / (1000*60));
diff %= (1000*60);

let seconds = Math.floor(diff / 1000);

// Display
mainAge.innerHTML = years + " Years";

ageDetails.innerHTML =
days + " Days<br>" +
hours + " Hours<br>" +
minutes + " Minutes<br>" +
seconds + " Seconds";

// At midnight unlock
if(now >= targetDate){
unlockText.style.opacity = "1";

setTimeout(()=>{
window.location.href="celebration.html";
},4000);
}

}

setInterval(updateAge,1000);
updateAge();

</script>

</body>
</html>
