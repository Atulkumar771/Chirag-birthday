<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlocked 👑</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle at center,#33004d,#1a0026);
color:white;
font-family:Arial;
text-align:center;
padding:30px;
overflow:hidden;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* Floating particles */
.particle{
position:absolute;
width:4px;
height:4px;
background:#ff80ab;
border-radius:50%;
opacity:0.6;
animation:float 10s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* Crown */
.crown{
font-size:36px;
margin-bottom:15px;
animation:crownGlow 2s infinite alternate;
}
@keyframes crownGlow{
from{text-shadow:0 0 5px #ff80ab;}
to{text-shadow:0 0 25px #ff1493;}
}

/* Title */
.title{
font-size:24px;
color:#ffb3c6;
margin-bottom:20px;
letter-spacing:1px;
}

/* Typing message */
.message{
max-width:550px;
font-size:18px;
line-height:1.7;
min-height:200px;
}

/* Final line */
.final{
margin-top:30px;
font-size:22px;
opacity:0;
transition:1.5s ease;
color:#ffd1dc;
text-shadow:0 0 20px #ff80ab;
}

/* Button */
button{
margin-top:40px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}
button:hover{
transform:scale(1.05);
}
</style>
</head>
<body>

<div class="crown">👑</div>
<div class="title">You Found The Code</div>

<div class="message" id="text"></div>

<div class="final" id="finalLine">
Through every phase of life…
I stand with you.
Brotherhood never expires. 🔥
</div>

<button onclick="goBack()">Back</button>

<audio id="bgMusic" src="loveyou.mp3" loop></audio>

<script>

/* Floating particles */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(p);
}

/* Typing effect */
const message = `
Life doesn’t give everyone a person
who stays consistent.

Not someone loud.
Not someone temporary.

But someone steady.

Through growth.
Through changes.
Through phases where people come and go.

You remained.

That’s not coincidence.
That’s character.

And character builds legacy.
`;

const textElement = document.getElementById("text");
const finalLine = document.getElementById("finalLine");

let index = 0;

function typeEffect(){
if(index < message.length){
textElement.innerHTML += message.charAt(index);
index++;
setTimeout(typeEffect, 30);
}else{
    // Show final line automatically after typing ends
    setTimeout(()=>{
        finalLine.style.opacity = "1";
    }, 800);
}
}

typeEffect();

/* MUSIC RESUME */
const music = document.getElementById("bgMusic");

window.onload = function(){
    const savedTime = localStorage.getItem("musicTime");
    if(savedTime){
        music.currentTime = parseFloat(savedTime);
    }
    music.play().catch(()=>{});
};

function goBack(){
window.location.href="celebration.html";
}

</script>

</body>
</html>
