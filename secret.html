<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlocked 👑</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#1a0026,#33004d);
color:white;
font-family:Arial;
text-align:center;
padding:30px;
overflow:hidden;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* Floating particles */
.particle{
position:absolute;
width:4px;
height:4px;
background:#ff80ab;
border-radius:50%;
opacity:0.6;
animation:float 8s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* Crown */
.crown{
font-size:32px;
margin-bottom:10px;
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 5px #ff80ab;}
to{text-shadow:0 0 20px #ff1493;}
}

/* Title */
.title{
font-size:26px;
margin-bottom:25px;
color:#ffb3c6;
}

/* Message */
.message{
max-width:550px;
font-size:18px;
line-height:1.7;
min-height:180px;
}

/* Final line */
.final{
margin-top:25px;
font-size:22px;
color:#ffd1dc;
opacity:0;
transition:1s ease;
text-shadow:0 0 20px #ff80ab;
}

button{
margin-top:40px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="crown">👑</div>
<div class="title">You Found The Code</div>

<div class="message" id="text"></div>

<div class="final" id="finalLine">
No matter what happens in life…
You’ll never walk alone.
I’ve got you. Always. 🔥
</div>

<button onclick="goBack()">Back</button>

<!-- SAME BACKGROUND MUSIC -->
<audio id="bgMusic" src="loveyou.mp3" autoplay loop></audio>

<script>

/* Floating particles */
for(let i=0;i<30;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}

/* Emotional message */
const message = `
Not every connection in life is loud.
Some grow quietly… but deeply.

Time passed.
Life moved.
People changed.

But one thing stayed steady —
your loyalty.

You showed up.
You stayed real.
You stood firm.

And that’s rare.

There are many people in this world.
But very few who become permanent.
`;

const textElement = document.getElementById("text");
const finalLine = document.getElementById("finalLine");

let index = 0;

function typeEffect(){
if(index < message.length){
textElement.innerHTML += message.charAt(index);
index++;
setTimeout(typeEffect, 35);
}
}

typeEffect();

/* Reveal final line on tap */
document.body.addEventListener("click", function(){
finalLine.style.opacity = "1";
});

/* Continue music from celebration page */
const music=document.getElementById("bgMusic");

window.onload=function(){
const savedTime=localStorage.getItem("musicTime");
if(savedTime){
music.currentTime=parseFloat(savedTime);
}
music.play();
};

/* Save music time before leaving */
music.addEventListener("timeupdate",()=>{
localStorage.setItem("musicTime",music.currentTime);
});

function goBack(){
window.location.href="celebration.html";
}

</script>

</body>
</html>
