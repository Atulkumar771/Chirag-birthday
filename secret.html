<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlocked 👑</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#1a0026,#33004d);
color:white;
font-family:Arial;
text-align:center;
padding:30px;
overflow:hidden;
}

.title{
font-size:26px;
color:#ffb3c6;
margin-bottom:20px;
}

.message{
max-width:550px;
font-size:18px;
line-height:1.7;
}

.final{
margin-top:20px;
font-size:22px;
opacity:0;
transition:1s;
}

button{
margin-top:40px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="title">You Found The Code 👑</div>

<div class="message">
Some connections aren’t loud…  
They’re steady.  
And steady is rare.  

Through every phase,  
you stayed real.  

That’s brotherhood.
</div>

<div class="final" id="finalLine">
I’ve got you. Always. 🔥
</div>

<button onclick="goBack()">Back</button>

<audio id="bgMusic" src="loveyou.mp3" loop></audio>

<script>
const music = document.getElementById("bgMusic");

window.onload=function(){
    const savedTime = localStorage.getItem("musicTime");
    if(savedTime){
        music.currentTime=parseFloat(savedTime);
    }
    music.play();
};

document.body.addEventListener("click",()=>{
document.getElementById("finalLine").style.opacity="1";
});

function goBack(){
window.location.href="celebration.html";
}
</script>

</body>
</html>
